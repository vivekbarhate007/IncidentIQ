apiVersion: apps/v1
kind: Deployment
metadata:
  name: incidentiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incidentiq
  template:
    metadata:
      labels:
        app: incidentiq
    spec:
      containers:
      - name: incidentiq
        image: incidentiq:latest
        ports:
        - containerPort: 8080
        env:
        - name: MONGO_URI
          value: "mongodb://mongo-service:27017/incidentiq"
---
apiVersion: v1
kind: Service
metadata:
  name: incidentiq-service
spec:
  selector:
    app: incidentiq
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
